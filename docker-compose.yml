x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mcp-youtube:
    build: .
    image: mcp-youtube:0.1.0
    container_name: mcp-youtube
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16M
    ports:
      - "${MCP_PORT:-3716}:${MCP_PORT:-3716}"
    env_file:
      - .env
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "${MCP_PORT:-3716}"
      TZ: "${TZ:-UTC}"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-m", "mcp_youtube.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
